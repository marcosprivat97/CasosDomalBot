# v12.3.1 - Force Refresh
name: CASOS DOMAL - Viral Bot 24/7 (PRO)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Debug Environment
        run: |
          echo "Verificando estrutura de pastas..."
          ls -R data/ || mkdir -p data
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"

      - name: Install Dependencies & Fix Sharp
        run: |
          npm install
          # Garante que o Sharp funcione no Linux do GitHub
          npm install --platform=linux --arch=x64 sharp

      - name: Run Viral Bot Cycle
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          FREEPIK_API_KEY: ${{ secrets.FREEPIK_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}

          NODE_ENV: production
        run: node src/actions_run.js

      - name: Persist Memory
        run: |
          git config --global user.name "Domal Cloud Bot"
          git config --global user.email "bot@casosdomal.com"
          git add data/*.json
          # Só tenta commitar e subir se houver mudanças nos arquivos JSON
          if ! git diff --quiet && ! git diff --staged --quiet; then
            git commit -m "🤖 Memória: Ciclo finalizado e histórico atualizado"
            # Pull com rebase para evitar conflitos se o repositório foi atualizado externamente
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          else
            echo "Nenhuma mudança na memória detectada."
          fi
